<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>𝕋𝕚𝕔 𝕋𝕒𝕔 𝕋𝕒𝕩𝕠𝕟</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #000;
      margin-top: 50px;
      color: #fff;
    }

    h1 {
      color: red;
    }

    .mode-buttons button {
      margin: 5px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .cell {
      width: 100px;
      height: 100px;
      font-size: 50px;
      font-weight: bold;
      background: #111;
      border: 2px solid red;
      border-radius: 15px; /* curved edges */
      color: red;
      cursor: pointer;
      transition: 0.2s;
    }

    .cell:hover {
      background: #222;
      transform: scale(1.05);
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: red;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      background: red;
      color: white;
      border: none;
      border-radius: 8px;
    }

    button:hover {
      background: #cc0000;
    }
  </style>
</head>

<body>

  <h1>Tic Tac Toe</h1>

  <div class="mode-buttons">
    <button onclick="setMode('pvp')">2 Players</button>
    <button onclick="setMode('ai')">Play vs AI</button>
  </div>

  <div class="board" id="board"></div>

  <p id="status">Choose a mode to start</p>
  <button onclick="resetGame()">Restart</button>

  <script>
    let board = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X";
    let gameActive = false;
    let mode = ""; // 'pvp' or 'ai'

    const winningConditions = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    const boardElement = document.getElementById("board");
    const statusText = document.getElementById("status");

    function setMode(selectedMode) {
      mode = selectedMode;
      resetGame();
      gameActive = true;
      statusText.innerText = "Player X's turn";
    }

    function createBoard() {
      boardElement.innerHTML = "";
      board.forEach((cell, index) => {
        const cellElement = document.createElement("button");
        cellElement.classList.add("cell");
        cellElement.innerText = cell;
        cellElement.addEventListener("click", () => handleClick(index));
        boardElement.appendChild(cellElement);
      });
    }

    function handleClick(index) {
      if (board[index] !== "" || !gameActive) return;

      if (mode === "ai" && currentPlayer !== "X") return;

      board[index] = currentPlayer;
      createBoard();
      checkWinner();

      if (!gameActive) return;

      if (mode === "ai") {
        currentPlayer = "O";
        statusText.innerText = "Computer's turn";
        setTimeout(computerMove, 500);
      } else {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusText.innerText = `Player ${currentPlayer}'s turn`;
      }
    }

    function computerMove() {
      let emptyCells = board
        .map((val, i) => val === "" ? i : null)
        .filter(v => v !== null);

      if (emptyCells.length === 0) return;

      let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      board[randomIndex] = "O";

      createBoard();
      checkWinner();

      if (gameActive) {
        currentPlayer = "X";
        statusText.innerText = "Player X's turn";
      }
    }

    function checkWinner() {
      let win = false;

      for (let condition of winningConditions) {
        let [a, b, c] = condition;

        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          win = true;
          break;
        }
      }

      if (win) {
        statusText.innerText = mode === "ai"
          ? (currentPlayer === "X" ? "You win!" : "Computer wins!")
          : `Player ${currentPlayer} wins!`;
        gameActive = false;
        return;
      }

      if (!board.includes("")) {
        statusText.innerText = "It's a draw!";
        gameActive = false;
      }
    }

    function resetGame() {
      board = ["", "", "", "", "", "", "", "", ""];
      currentPlayer = "X";
      gameActive = mode !== ""; // only active if mode selected
      statusText.innerText = mode ? "Player X's turn" : "Choose a mode to start";
      createBoard();
    }

    createBoard();
  </script>

</body>
</html>
